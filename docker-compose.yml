services:
  entitleguard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Coolify magic variable: auto-assigns an FQDN from your wildcard domain
      # and routes it to port 3000 through the Coolify proxy (Traefik).
      - SERVICE_FQDN_ENTITLEGUARD_3000
      - ENTITLEGUARD_DB_PATH=/data/entitleguard.db
      # Set in Coolify env vars to enable the read-only /admin page
      # (Basic auth, user "admin"). Unset = /admin returns 404.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      # Persists leads, audit summaries, and analytics events across deploys.
      - entitleguard-data:/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  entitleguard-data:
